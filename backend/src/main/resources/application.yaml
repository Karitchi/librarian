spring:
  application:
    name: library
  datasource:
    url: jdbc:postgresql://localhost:5432/library
    username: admin
    password: admin
  sql:
    init:
      mode: always  # Always run schema.sql on startup
      platform: postgresql
  jpa:
    hibernate:
      ddl-auto: none  # Don't modify your existing table
    show-sql: true    # See SQL queries in console
  jwt:
    secret: ${JWT_SECRET:mySuperSecretKeyForJWTThatIsAtLeast32CharsLong}
    expiration: 86400000  # 24 hours in milliseconds
